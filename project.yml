name: VoiceJournal
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  VoiceJournal:
    type: application
    platform: iOS
    sources:
      - VoiceJournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.VoiceJournal
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen: []
        INFOPLIST_KEY_UIRequiredDeviceCapabilities: []
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        INFOPLIST_KEY_UIRequiresFullScreen: YES
  VoiceJournalWidget:
    type: app-extension
    platform: iOS
    sources:
      - VoiceJournalWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.VoiceJournal.VoiceJournalWidget
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
